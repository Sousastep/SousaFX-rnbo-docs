site_name: sousafx
site_url: https://rnbo.sousastep.quest/
nav:
  - Introduction: index.md
  - Hardware: hardware.md
  - Setup: setup.md
  - Installation: installation.md
  - Documentation: documentation.md
  - Overview: overview.md
  - Bindings: bindings.md
  - Loopers: loopers.md
  - Modding: modding.md
  - Release Notes: releasenotes.md
  - Purchase: purchase.md
  - Attributions: attributions.md

theme:
  name: material
  palette:
    scheme: slate
    primary: black

  features:
    - search.suggest
    - search.highlight
    - search.share
    - navigation.footer

  logo: img/logo.png
  favicon: img/favicon.ico

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/linktree
      link: https://www.sousastep.quest/links/
    - icon: fontawesome/brands/github
      link: https://github.com/jbaylies
    - icon: fontawesome/brands/discord
      link: https://discord.gg/JkSQzfZUdT

plugins:
  - search
  - open-in-new-tab
  - autorefs
  - offline:
      enabled: !ENV [OFFLINE, false]

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.blocks.caption
  - attr_list
  - md_in_html
  - def_list

